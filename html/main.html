<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Little Library</title>
  <link rel="stylesheet" href="../css/style.css?v=15" />
</head>
<body data-page="main">
  <div class="page">
    <div class="container">
      <header class="header">
        <a href="main.html" class="logo">
          <div class="logo-icon">L</div>
          <div class="logo-text">
            <strong>Little Library</strong>
            <span>웹툰 & 웹소설 & 만화 & 애니</span>
          </div>
        </a>

        <form class="search-box">
          <label class="search-scope-label" aria-label="검색 범위">
            <select id="searchScopeSelect">
              <option value="all">전체</option>
              <option value="title">제목</option>
              <option value="author">작가</option>
              <option value="tags">태그</option>
              <option value="description">작품소개</option>
              <option value="memo">메모</option>
            </select>
          </label>
          <input type="text" placeholder="제목, 작가를 입력하세요" />
          <button type="submit" aria-label="검색">
            <img src="../image/search.svg" alt="검색" />
          </button>
        </form>

        <div class="menu-wrap">
          <button class="menu-button" type="button" aria-label="메뉴 열기">
            <span></span>
            <span></span>
            <span></span>
          </button>
          <div class="dropdown-menu">
            <a href="library.html?page=webtoon">웹툰</a>
            <a href="library.html?page=webnovel">웹소설</a>
            <a href="library.html?page=manga">만화</a>
            <a href="library.html?page=anime">애니</a>
            <a href="library.html?page=recent">최근기록</a>
            <a href="library.html?page=library">보관함</a>
          </div>
        </div>
      </header>

      <main class="hero">
        <section class="main-banner" aria-label="추천 배너">
          <div class="main-banner-track">
            <article class="main-banner-slide active">
              <div>
                <span class="main-banner-kicker">오늘의 정리</span>
                <h2>읽는 중인 작품을<br />한 번에 이어보세요</h2>
                <p>회차와 메모를 남겨두면 다음에 볼 작품을 더 빠르게 찾을 수 있습니다.</p>
              </div>
            </article>

            <article class="main-banner-slide">
              <div>
                <span class="main-banner-kicker">나만의 기록</span>
                <h2>취향별 작품을<br />태그로 묶어보세요</h2>
                <p>장르, 평점, 개인 메모까지 함께 정리해서 다시 찾기 쉽게 보관하세요.</p>
              </div>
            </article>

            <article class="main-banner-slide">
              <div>
                <span class="main-banner-kicker">최근기록</span>
                <h2>방금 수정한 작품을<br />놓치지 마세요</h2>
                <p>최근에 기록한 작품부터 확인하고, 이어서 볼 작품을 바로 골라보세요.</p>
              </div>
            </article>
          </div>

          <div class="main-banner-controls" aria-label="배너 이동">
            <div class="main-banner-dots" aria-label="배너 선택"></div>
          </div>
        </section>

        <aside class="preview-card">
          <div class="preview-top">
            <label class="preview-type-label" aria-label="미리보기 구분">
              <select id="previewTypeSelect">
                <option value="webtoon">웹툰</option>
                <option value="webnovel">웹소설</option>
                <option value="manga">만화</option>
                <option value="anime">애니</option>
              </select>
            </label>
            <div class="preview-controls">
              <button class="move-button icon-button prev-work-button" type="button" aria-label="이전 작품">
                <img src="../image/left.svg" alt="" aria-hidden="true" />
              </button>
              <button class="move-button icon-button next-work-button" type="button" aria-label="다음 작품">
                <img src="../image/right.svg" alt="" aria-hidden="true" />
              </button>
            </div>
          </div>

          <div class="stats">
            <button class="stat-item" type="button">
              <strong id="readingCount"></strong>
              <span>읽는 중</span>
            </button>
            <button class="stat-item" type="button">
              <strong id="completedCount"></strong>
              <span>완독</span>
            </button>
            <button class="stat-item" type="button">
              <strong id="pausedCount"></strong>
              <span>보류</span>
            </button>
          </div>

          <div class="novel-card">
            <div class="novel-card-top">
              <span class="rating" id="contentRating"></span>
            </div>
            <div class="novel-card-title-row">
              <h3 id="contentTitle"></h3>
              <span class="novel-card-author" id="contentAuthor"></span>
            </div>
            <p id="contentDescription"></p>
          </div>
        </aside>
      </main>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/state.js"></script>
  <script src="../js/navigation.js"></script>
  <script src="../js/search.js"></script>
  <script src="../js/main-preview.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>
