<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>보관함 | Little Library</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body data-page="library">
  <div class="page">
    <div class="container">
      <header class="header">
        <a href="main.html" class="logo">
          <div class="logo-icon">L</div>
          <div class="logo-text">
            <strong>Little Library</strong>
            <span>웹툰 & 웹소설 & 만화 & 애니</span>
          </div>
        </a>

        <form class="search-box">
          <label class="search-scope-label" aria-label="검색 범위">
            <select id="searchScopeSelect">
              <option value="page">현재 페이지</option>
              <option value="title">제목</option>
              <option value="author">작가</option>
              <option value="tags">태그</option>
              <option value="description">작품소개</option>
              <option value="memo">메모</option>
            </select>
          </label>
          <input id="librarySearchInput" type="text" placeholder="보관함에서 검색하세요." />
          <button type="submit" aria-label="검색">
            <img src="../../image/search.svg" alt="검색" />
          </button>
        </form>

        <div class="menu-wrap">
          <button class="menu-button" type="button" aria-label="메뉴 열기">
            <span></span>
            <span></span>
            <span></span>
          </button>
          <div class="dropdown-menu">
            <a href="library.html?page=webtoon">웹툰</a>
            <a href="library.html?page=webnovel">웹소설</a>
            <a href="library.html?page=manga">만화</a>
            <a href="library.html?page=anime">애니</a>
            <a href="library.html?page=recent">최근기록</a>
            <a href="library.html?page=library">보관함</a>
          </div>
        </div>
      </header>

      <main class="library-page">
        <section class="library-head">
          <div>
            <p class="eyebrow" id="libraryEyebrow">LIBRARY</p>
            <div class="library-title-row">
              <div class="library-title-wrap">
                <h1 id="libraryPageTitle">보관함</h1>
                <span class="library-count" id="libraryWorkCount">| 전체 0</span>
              </div>
              <button class="button-primary add-work-button" type="button">작품 추가하기</button>
            </div>
            <p id="libraryDescription">저장한 작품들을 관리하는 페이지입니다.</p>
          </div>
        </section>

        <section class="library-filter">
          <button class="filter-button active" type="button" data-filter="all">전체</button>
          <button class="filter-button" type="button" data-filter="completed">완독</button>
          <button class="filter-button" type="button" data-filter="paused">보류</button>
          <button class="filter-button" type="button" data-filter="dropped">하차</button>
          <button class="filter-button" type="button" data-filter="reading">읽는 중</button>
        </section>

        <section class="library-tools" aria-label="작품 관리 도구">
          <div class="tool-group type-filter-group">
            <label>
              종류
              <select id="typeFilter">
                <option value="all">전체</option>
                <option value="webtoon">웹툰</option>
                <option value="webnovel">웹소설</option>
                <option value="manga">만화</option>
                <option value="anime">애니</option>
              </select>
            </label>
          </div>

          <div class="tool-group">
            <label>
              장르
              <select id="genreFilter">
                <option value="all">전체 장르</option>
              </select>
            </label>
          </div>

          <div class="tool-group">
            <label>
              평점
              <select id="ratingFilter">
                <option value="all">전체 평점</option>
                <option value="5">5점</option>
                <option value="4">4점</option>
                <option value="3">3점</option>
                <option value="2">2점</option>
                <option value="1">1점</option>
              </select>
            </label>
          </div>

          <div class="tool-group">
            <label>
              정렬
              <select id="sortSelect">
                <option value="title">제목순</option>
                <option value="ratingDesc">높은 평점순</option>
                <option value="ratingAsc">낮은 평점순</option>
                <option value="recent">최근 기록순</option>
              </select>
            </label>
          </div>

          <div class="backup-tools">
            <button class="tool-button export-works-button" type="button" aria-label="JSON 내보내기">
              <img src="../../image/download.svg" alt="" aria-hidden="true" />
            </button>

            <button class="tool-button import-works-button" type="button" aria-label="JSON 가져오기">
              <img src="../../image/upload.svg" alt="" aria-hidden="true" />
            </button>

            <input id="importWorksInput" type="file" accept="application/json,.json" hidden />
          </div>
        </section>

        <section class="library-grid" id="libraryGrid"></section>
      </main>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/state.js"></script>
  <script src="../js/navigation.js"></script>
  <script src="../js/search.js"></script>
  <script src="../js/library.js"></script>
  <script src="../js/modal-utils.js"></script>
  <script src="../js/form-modal.js"></script>
  <script src="../js/backup.js"></script>
  <script src="../js/detail-modal.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>
